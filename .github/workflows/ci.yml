name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Third-party actions are pinned to full commit SHAs (not mutable tags) to
# prevent supply-chain repointing. The trailing comment records the human tag.
jobs:
  test:
    name: build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

    # NOTE: fmt (`cargo fmt --all --check`) and clippy (`-D warnings`) gates are
    # intentionally omitted for now — the pre-existing tree is not yet rustfmt-
    # formatted or clippy-clean, so those gates would fail on unrelated code.
    # Add them in a follow-up once the codebase is normalized (`cargo fmt --all`).

  coverage:
    name: coverage (gateway >= 80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@9458fed45835344deb5e69e06e831be047c96abf # cargo-llvm-cov

      - name: Coverage (fail under 80% lines)
        run: cargo llvm-cov -p gateway --summary-only --fail-under-lines 80
