name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN for every job: they only read the repo (checkout
# + build/test/coverage). The coverage upload authenticates to Qlty with
# QLTY_COVERAGE_TOKEN, not GITHUB_TOKEN, so no write scopes are needed.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Third-party actions are pinned to full commit SHAs (not mutable tags) to
# prevent supply-chain repointing. The trailing comment records the human tag.
jobs:
  test:
    name: build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

    # NOTE: fmt (`cargo fmt --all --check`) and clippy (`-D warnings`) gates are
    # intentionally omitted for now — the pre-existing tree is not yet rustfmt-
    # formatted or clippy-clean, so those gates would fail on unrelated code.
    # Add them in a follow-up once the codebase is normalized (`cargo fmt --all`).

  coverage:
    name: coverage (gateway >= 80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@9458fed45835344deb5e69e06e831be047c96abf # cargo-llvm-cov

      - name: Coverage (lcov + fail under 80% lines)
        # Writes the lcov report *before* evaluating the threshold, so the file
        # exists for the upload step even when the gate trips.
        run: cargo llvm-cov -p sensei-gateway --lcov --output-path target/lcov.info --fail-under-lines 80

      - name: Upload coverage to Qlty
        # `if: always()` so the coverage number still reports to Qlty even when
        # the 80%-line gate above fails. Pinned to the v2 commit SHA per the
        # supply-chain policy noted above.
        if: always()
        uses: qltysh/qlty-action/coverage@08a0a862c159eae9b9003081da6663d96efef637 # v2
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: target/lcov.info
