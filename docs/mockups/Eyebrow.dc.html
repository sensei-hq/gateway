<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</helmet>
<div style="{{ style }}">{{ label }}</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:200,&quot;height&quot;:20},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;The routing engine&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;dark&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props || {};
    const dark = !!p.dark;
    return {
      label: p.label || '',
      style: {
        fontFamily: '"JetBrains Mono",ui-monospace,monospace',
        fontSize: '12.5px', fontWeight: 600,
        color: dark ? '#58a6ff' : '#2f7ff2',
        letterSpacing: '.04em', textTransform: 'uppercase',
      },
    };
  }
}
</script>
</body>
</html>
