<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</helmet>
<div style="{{ shellStyle }}">
  <div style="{{ barStyle }}">
    <span style="width:11px;height:11px;border-radius:50%;background:#ff5f57"></span>
    <span style="width:11px;height:11px;border-radius:50%;background:#febc2e"></span>
    <span style="width:11px;height:11px;border-radius:50%;background:#28c840"></span>
    <span style="{{ nameStyle }}">{{ filename }}</span>
    <sc-if value="{{ copyable }}">
      <button onClick="{{ copy }}" style="{{ copyBtnStyle }}">{{ copyLabel }}</button>
    </sc-if>
  </div>
  <pre style="{{ preStyle }}">{{ code }}</pre>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:560,&quot;height&quot;:220},&quot;filename&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Cargo.toml&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;code&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;[dependencies]\ngateway = { git = \&quot;...\&quot; }&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;dark&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;copyable&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  state = { copied: false };
  copy = () => {
    try { navigator.clipboard.writeText(this.props.code || ''); } catch (e) {}
    this.setState({ copied: true });
    clearTimeout(this._t);
    this._t = setTimeout(() => this.setState({ copied: false }), 1500);
  };
  renderVals() {
    const p = this.props || {};
    const dark = p.dark !== false;
    const mono = '"JetBrains Mono",ui-monospace,monospace';
    const c = dark
      ? { bg: '#0d1117', bar: '#161b22', border: '#1c2230', text: '#e6edf3', name: '#7d8698', copyBg: 'rgba(255,255,255,.06)', copyText: '#9aa4b2' }
      : { bg: '#f6f8fa', bar: '#eef1f4', border: '#e3e6ea', text: '#1f2328', name: '#8b91a0', copyBg: 'rgba(0,0,0,.05)', copyText: '#565c6b' };
    return {
      filename: p.filename || 'code',
      code: p.code || '',
      copyable: !!p.copyable,
      copyLabel: this.state.copied ? 'Copied' : 'Copy',
      copy: this.copy,
      shellStyle: { borderRadius: '14px', overflow: 'hidden', border: '1px solid ' + c.border, boxShadow: dark ? '0 24px 60px -30px rgba(13,17,23,.5)' : '0 12px 40px -24px rgba(18,20,26,.28)' },
      barStyle: { background: c.bar, padding: '11px 14px', display: 'flex', alignItems: 'center', gap: '8px', borderBottom: '1px solid ' + c.border },
      nameStyle: { fontFamily: mono, fontSize: '12.5px', color: c.name, marginLeft: '6px' },
      copyBtnStyle: { marginLeft: 'auto', appearance: 'none', border: 'none', cursor: 'pointer', fontFamily: mono, fontSize: '11.5px', color: c.copyText, background: c.copyBg, padding: '4px 10px', borderRadius: '6px' },
      preStyle: { margin: 0, background: c.bg, color: c.text, padding: '20px', fontFamily: mono, fontSize: '13.5px', lineHeight: 1.8, overflowX: 'auto' },
    };
  }
}
</script>
</body>
</html>
